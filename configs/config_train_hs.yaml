resume:
load_encoder: True
load_fuse_generator: True
device: cuda:3
image_size: 224
K: 1 # temporal sequence length - no temporal data used here
deterministic: False

train:
  lr: 1e-3
  num_epochs: 50
  batch_size: 16 # 32
  num_workers: 4
  log_path: logs/smirkhair
  log_append_timestamp: True
  log_losses_every: 0 # 10    # this is per # batch
  visualize_every: 50   # num_batch
  mask_ratio: 0.01  # % pixel to be retained inside the hair mask #TODO: need to increase, hair region is 
  mask_dilation_radius: 10 # dilation of the initial hair mask
  save_every: 2 # save model every n epochs
  use_wandb: False
  Ke: 1 # number of repeated frames for 2nd cycle path
  # samples_per_epoch: 50000   TODO: if using multiple datasets, need to change this
  use_base_model_for_regularization: True  # use the base model for regularization - when False the regularization is wrt zero
  resume_epoch: 0
  # train_scale_min: 1.2  # min scale for data augmentation during training
  # train_scale_max: 1.8 # max scale for data augmentation during training
  # test_scale: 1.6 # fixed scale for testing

  loss_weights:
    # landmark_loss: 100.0   # landmark loss weight
    perceptual_vgg_loss: 10.0  # RECONSTRUCTION - perceptual vgg loss weight
    reconstruction_loss: 10.0  # RECONSTRUCTION - l1 loss weight
    strand_regularization: 1e-2
    depth_regularization: 1e-2
    # emotion_loss: 0.0  # extra emotion loss weight 
    # jaw_regularization: 1e-2
    # expression_regularization: 1e-3
    # shape_regularization: 100  
    cycle_loss: 0.0  # CYCLE loss - NOT implemented
    # cycle_loss: 1.0  # CYCLE loss
    # mica_loss: 0

  # optimize_pose: False
  # optimize_shape: False
  # optimize_expression: True  # optimize only expression
  optimize_hairstrand: True
  optimize_hairdepth: True

  # automatically tunable hyperparameters - just declared here
  freeze_encoder_in_second_path: False
  freeze_generator_in_second_path: False

# architectural details
arch:
  num_strand: 0   # strand size
  num_depth: 0    # depth size
  enable_fuse_generator: True 

# hairstep
checkpoint_img2strand: /gpfs/projects/CascanteBonillaGroup/thinguyen/storage/smirk/external/HairStep/checkpoints/img2hairstep/img2strand.pth
checkpoint_img2depth: /gpfs/projects/CascanteBonillaGroup/thinguyen/storage/smirk/external/HairStep/checkpoints/img2hairstep/img2depth.pth


dataset:
