resume: False
load_encoder: True
load_fuse_generator: True
device: cuda:0    # usually use cuda:3 but for job use 0
image_size: 224
K: 1 # temporal sequence length - no temporal data used here
deterministic: False
return_low_freq_hair: True

train:
  lr: 1e-3
  lr_encoder: 1e-5
  lr_generator: 1e-3
  lr_ramp:
    encoder:
      enabled: True
      start_epoch: 1       # zero-indexed; first epoch where the per-epoch ramp is active
      inverse_to_generator_decay: True
      duration_fraction: 1.0  # fallback when inverse_to_generator_decay is False
      start_factor: 0.1
      end_factor: 1.0
    generator:
      enabled: False
      start_epoch: 0
      duration_fraction: 0.0
      start_factor: 1.0
      end_factor: 1.0
  encoder_batchnorm_eval: True
  gradient_clipping:
    enabled: True
    encoder_max_norm: 1.0
    generator_max_norm: 0.1
    norm_type: 2.0
  num_epochs: 50
  batch_size: 10 # 32
  num_workers: 4
  log_path: /data/add_disk3/arivero/logs
  log_append_timestamp: True
  run_name_suffix: ""  # CLI example: train.run_name_suffix=nodepth -> YYYYMMDD_HHMMSS_nodepth
  log_losses_every: 0 # 10    # this is per # batch
  visualize_phase:
    train: True
    val: True
  visualize_every: 25   # num_batch
  color_augmentation:
    enabled: True
    random_brightness_contrast:
      p: 0.8
      brightness_limit: 0.2
      contrast_limit: 0.2
    gamma:
      p: 0.4
      gamma_limit: [80, 120]
    color_jitter:
      p: 0.8
      brightness: 0.2
      contrast: 0.2
      saturation: 0.25
      hue: 0.05
    rgb_shift:
      p: 0.5
      r_shift_limit: 15
      g_shift_limit: 15
      b_shift_limit: 15
  debug:
    dump_hair: False
    dump_hit_faces: False
    save_hair_render: False
    save_hairstep_maps: False
    save_inverse_intersection_mask: False
    render_flame_mesh: False
    break_step2: False
  mask_ratio: 0.01  # pixel to be retained inside the hair mask, ratio is over the whole image
  mask_dilation_radius: 10 # dilation of the initial hair mask
  step2_sparse_color:
    tangent_radius: 18
    normal_radius: 6
    fallback_radius: 24
    candidate_pool: 8
    use_hair_mask_union: True
    fill_inverse_intersection_samples: True
  save_every: 2 # save model every n epochs
  wandb:
    enabled: True
    project: hair-synthesis
    entity:
    run_name:
    mode: online
  Ke: 1 # number of repeated frames for 2nd cycle path
  use_base_model_for_regularization: True  # use the base model for regularization - when False the regularization is wrt zero
  resume_epoch: 0
  warmup_epochs: 1  # freeze encoder, train generator only, and skip cycle rendering for first N epochs
  smirk_crop_scale: 1.6
  force_closed_mouth: True
  zero_flame_expression: True
  hair_template_augmentation:
    enabled: False
    scale_min: 0.8
    scale_max: 1.2
    noise_std: 0.05
    value_range: [-200.0, 200.0]
    apply_probability: 0.4

  loss_weights:
    perceptual_vgg_loss: 5.0  # RECONSTRUCTION - perceptual vgg loss weight
    reconstruction_loss: 10.0  # RECONSTRUCTION - l1 loss weight
    strand_regularization: 0.0
    depth_regularization: 0.0
    cycle_loss: 0.0  # overall step-2 cycle scale
    cycle_orient_loss: 1.0
    cycle_depth_loss: 0.0
    strand_along_regularization: 0.0  # along-strand sign consistency
    strand_along_step: 1.5   # sampling offset in pixels along predicted orientation
    strand_local_regularization: 0.0   # local smooth loss
    strand_local_kernel: 3   # local smooth loss
    strand_local_stride: 1   # local smooth loss
    strand_local_padding: 3   # local smooth loss
    depth_local_regularization: 0.0     # local smooth loss
    depth_local_kernel: 3

  optimize_hairstrand: True
  optimize_hairdepth: False   # has depth but no graph

  # automatically tunable hyperparameters - just declared here
  freeze_encoder_in_second_path: False
  freeze_generator_in_second_path: False
  freeze_smirk_encoder: True

# architectural details
arch:
  encoder_norm_strand_magnitude: True
  enable_fuse_generator: True
  depth_branch: False     # No depth map
  num_expression: 50
  num_shape: 300
  use_eyelids: True
  enable_pre_render_culling: False
  pre_render_head_scale: 0.94
  perm_scale: 100.0
  perm_translation: [-1.03059 , -0.630004, 3.36756]
  perm_rotation_euler_deg: [0.0, 0.0, 0.0]
  perm_head_mesh_path: /home/alrivero/HairSynthesis/assets/perm_head.obj

# hairstep
checkpoint_img2strand: /home/alrivero/HairStep/checkpoints/img2hairstep/img2strand.pth
checkpoint_img2depth: /home/alrivero/HairStep/checkpoints/img2hairstep/img2depth.pth

# smirk pretrain
checkpoint_smirk: pretrained_models/SMIRK_em1.pt
load_generator: False

dataset:
  resolution: 512

  FFHQ:
    FFHQ_path: /data/add_disk3/arivero/images1024x1024/images
    FFHQ_meta_path: /data/add_disk3/arivero/ffhq-dataset-v2.json
    FFHQ_include_list: /data/add_disk3/arivero/images1024x1024/kept_names_mask_reports.txt
    FFHQ_hairmask: /data/add_disk3/arivero/images1024x1024/masks/hair
    FFHQ_bodymask: /data/add_disk3/arivero/images1024x1024/masks/body
    FFHQ_apply_person_mask_to_image: True
    FFHQ_apply_body_mask_to_image: False
    FFHQ_apply_mask_to_image: none  # legacy options: none, body, hair
    FFHQ_encoder_hair_support_threshold: 0.05
    FFHQ_mediapipe_landmarks_path:

    # percentage of data to use for each dataset
    FFHQ_percentage: 1    # sampling weight when training multiple datasets

    # using subset of the dataset only
    FFHQ_percentage_subset: 1 # include list already selects usable images

  Hair20k:
    blenshape_path: assets/blend-shapes/strands-blend-shapes.npz
    Hair20k_path: /data/add_disk4/alrivero/neural-textures/high-res
    load_roots: True
