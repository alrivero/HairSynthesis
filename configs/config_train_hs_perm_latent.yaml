resume: False
load_encoder: True
load_fuse_generator: True
device: cuda:0    # usually use cuda:3 but for job use 0
image_size: 224
K: 1 # temporal sequence length - no temporal data used here
deterministic: False
return_low_freq_hair: True

train:
  lr: 5e-4
  lr_encoder: 1e-5
  lr_generator: 1e-3
  lr_ramp:
    encoder:
      enabled: False
      start_epoch: 0       # zero-indexed; first epoch where the per-epoch ramp is active
      inverse_to_generator_decay: True
      duration_fraction: 1.0  # fallback when inverse_to_generator_decay is False
      start_factor: 0.6666
      end_factor: 1.0
    generator:
      enabled: False
      start_epoch: 0
      duration_fraction: 0.0
      start_factor: 1.0
      end_factor: 1.0
  encoder_batchnorm_eval: True
  gradient_clipping:
    enabled: True
    encoder_max_norm: 0.1
    generator_max_norm: 1.0
    norm_type: 2.0
  num_epochs: 50
  batch_size: 6 # 32
  num_workers: 4
  log_path: /data/add_disk3/arivero/logs
  log_append_timestamp: True
  run_name_suffix: "perm_latent"
  log_losses_every: 0 # 10    # this is per # batch
  visualize_phase:
    train: True
    val: True
  visualize_every: 2   # num_batch
  debug:
    dump_hair: False
    dump_hit_faces: False
    save_hair_render: False
    save_step1_perm_strands_ply: False
    save_hairstep_maps: False
    save_inverse_intersection_mask: False
    render_flame_mesh: False
    break_step2: False
  mask_ratio: 0.01  # pixel to be retained inside the hair mask, ratio is over the whole image
  mask_dilation_radius: 10 # dilation of the initial hair mask
  step2_sparse_color:
    tangent_radius: 18
    normal_radius: 6
    fallback_radius: 24
    candidate_pool: 8
    use_hair_mask_union: True
    fill_inverse_intersection_samples: False
  step2_face_cleanup:
    enabled: True
  save_every: 1 # save model every n epochs
  wandb:
    enabled: True
    project: hair-synthesis
    entity:
    run_name:
    mode: online
  Ke: 1 # number of repeated frames for 2nd cycle path
  use_base_model_for_regularization: True  # ignored in perm_latent mode
  resume_epoch: 0
  warmup_epochs: 0  # freeze encoder, train generator only, and skip cycle rendering for first N epochs
  warmup_batches: 0  # optional override; when > 0, use train batches instead of epochs and reset schedulers when warmup ends
  smirk_crop_scale: 1.6
  force_closed_mouth: True
  zero_flame_expression: True
  hair_template_augmentation:
    enabled: False
    scale_min: 0.8
    scale_max: 1.2
    noise_std: 0.05
    value_range: [-200.0, 200.0]
    apply_probability: 0.4
  cycle_consistency_target: maps  # theta_beta/both currently warn and fall back to maps

  loss_weights:
    perceptual_vgg_loss: 5.0  # RECONSTRUCTION - perceptual vgg loss weight
    reconstruction_loss: 10.0  # RECONSTRUCTION - l1 loss weight
    strand_regularization: 0.0
    depth_regularization: 0.0
    cycle_loss: 0.0  # overall step-2 cycle scale
    cycle_orient_loss: 1.0
    cycle_depth_loss: 1.0
    strand_along_regularization: 0.0
    strand_along_step: 1.5
    strand_local_regularization: 0.0
    strand_local_kernel: 3
    strand_local_stride: 1
    strand_local_padding: 3
    depth_local_regularization: 0.0
    depth_local_kernel: 3

  optimize_hairstrand: True
  optimize_hairdepth: False

  freeze_encoder_in_second_path: False
  freeze_generator_in_second_path: False
  freeze_smirk_encoder: True

# architectural details
arch:
  encoder_mode: perm_latent   # hairstep_maps | perm_latent
  encoder_norm_strand_magnitude: True
  enable_fuse_generator: True
  depth_branch: True
  num_expression: 50
  num_shape: 300
  use_eyelids: True
  enable_pre_render_culling: False
  pre_render_head_scale: 0.94
  rasterizer_strand_culling:
    enabled: False
    root_segments: 4
    min_occluded_pixels: 1
    min_occluded_fraction: 0.0
  perm_scale: 100.0
  perm_translation: [-1.03059 , -0.630004, 3.36756]
  perm_rotation_euler_deg: [0.0, 0.0, 0.0]
  perm_head_mesh_path: /home/alrivero/HairSynthesis/assets/perm_head.obj
  perm_latent_dim: 512
  perm_theta_condition_dim: 256

# hairstep
checkpoint_img2strand: /home/alrivero/HairStep/checkpoints/img2hairstep/img2strand.pth
checkpoint_img2depth: /home/alrivero/HairStep/checkpoints/img2hairstep/img2depth.pth

# smirk pretrain
checkpoint_smirk: pretrained_models/SMIRK_em1.pt
load_generator: False

perm:
  model_path: /home/alrivero/HairSynthesis/pretrained_models/perm_v1.0
  init_params_path: /home/alrivero/perm/src/out_afro/afro_perm_params.npz
  latent_space: broadcast_w
  scalp_bounds: [0.1870, 0.8018, 0.4011, 0.8047]
  scalp_mask_path: assets/FLAME_masks/FLAME_masks.pkl
  scalp_mask_key: scalp
  root_grid_resolution: 128   # dense canonical UV support before root subsampling
  num_render_strands: 20000    # raise alongside root_grid_resolution if you want more rendered strands
  guide_mask_threshold: 0.35
  use_guide_mask: True
  ray_chunk_size: 128
  max_root_count:             # legacy alias for num_render_strands

dataset:
  resolution: 512

  FFHQ:
    FFHQ_path: /data/add_disk3/arivero/images1024x1024/images
    FFHQ_meta_path: /data/add_disk3/arivero/ffhq-dataset-v2.json
    FFHQ_include_list: /data/add_disk3/arivero/images1024x1024/kept_names_mask_reports.txt
    FFHQ_hairmask: /data/add_disk3/arivero/images1024x1024/masks/hair
    FFHQ_bodymask: /data/add_disk3/arivero/images1024x1024/masks/body
    FFHQ_facemask: /data/add_disk3/arivero/images1024x1024/masks/face
    FFHQ_apply_person_mask_to_image: True
    FFHQ_apply_body_mask_to_image: False
    FFHQ_apply_face_hair_mask_to_image: False
    FFHQ_apply_mask_to_image: none  # legacy options: none, body, hair, face_hair
    FFHQ_encoder_hair_support_threshold: 0.05
    FFHQ_mediapipe_landmarks_path:

    FFHQ_percentage: 1
    FFHQ_percentage_subset: 1

  Hair20k:
    blenshape_path: assets/blend-shapes/strands-blend-shapes.npz
    Hair20k_path: /data/add_disk1/alrivero/neural-textures/high-res
    load_roots: True
    root_cache_enabled: True
    root_scale: 2.5
    root_cache_workers: 16
    root_cache_knn_k: 8
    root_cache_force_rebuild: False
